name: upsc_daily_edge
description: UPSC Daily Edge - Daily Current Affairs & Exam Preparation App

publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.4.4
  google_sign_in: ^6.1.6

  # State Management
  provider: ^6.1.1

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # HTTP
  http: ^1.2.1

  # Utilities
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  path_provider: ^2.1.2
  intl: ^0.19.0
  flutter_local_notifications: ^17.0.0
  percent_indicator: ^4.2.3
  shared_preferences: ^2.2.2
  google_mobile_ads: ^7.0.0
  timezone: ^0.9.4
  lottie: ^3.3.2
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/app_icons/
    - assets/flaticon_pngs/
    - assets/animations/
