name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Setup signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/upload.p12
          # Import PKCS12 into JKS, let keytool auto-assign alias
          keytool -importkeystore \
            -srckeystore /tmp/upload.p12 \
            -srcstoretype PKCS12 \
            -srcstorepass android \
            -destkeystore android/app/upload-keystore.jks \
            -deststoretype JKS \
            -deststorepass android \
            -destkeypass android \
            -noprompt
          # Find the alias that was imported
          ALIAS=$(keytool -list -keystore android/app/upload-keystore.jks -storepass android | grep "PrivateKeyEntry\|privatekey\|key entry" | head -1 | cut -d',' -f1)
          echo "Detected alias: $ALIAS"
          cat > android/key.properties << EOF
          storePassword=android
          keyPassword=android
          keyAlias=$ALIAS
          storeFile=upload-keystore.jks
          EOF
          cat android/key.properties

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --split-per-abi

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          fi

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/UPSC-Daily-Edge.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/UPSC-Daily-Edge-${{ steps.version.outputs.tag }}-arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/UPSC-Daily-Edge-${{ steps.version.outputs.tag }}-arm32.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "UPSC Daily Edge ${{ steps.version.outputs.tag }}"
          body: |
            ## UPSC Daily Edge - Android App

            ### What's included:
            - 📰 Daily Current Affairs from Drishti IAS & Insights on India
            - 🧠 Smart Quizzes with XP tracking
            - 📝 Flash Revision cards & mnemonics
            - 📊 Progress tracking & streaks

            ### Install:
            1. Download **UPSC-Daily-Edge.apk** (recommended, works on most devices)
            2. Open it on your Android device
            3. Allow installation from unknown sources if prompted
            4. Done!

            > If the main APK doesn't work on your device, try the arm32 variant.
          files: |
            build/app/outputs/flutter-apk/UPSC-Daily-Edge.apk
            build/app/outputs/flutter-apk/UPSC-Daily-Edge-${{ steps.version.outputs.tag }}-arm64.apk
            build/app/outputs/flutter-apk/UPSC-Daily-Edge-${{ steps.version.outputs.tag }}-arm32.apk
          draft: false
          prerelease: false

      - name: Deploy APK to GitHub Pages
        run: |
          cp build/app/outputs/flutter-apk/UPSC-Daily-Edge.apk /tmp/UPSC-Daily-Edge.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/UPSC-Daily-Edge.apk UPSC-Daily-Edge.apk
          git add UPSC-Daily-Edge.apk
          git commit -m "Update APK to ${{ steps.version.outputs.tag }}" || true
          git push origin gh-pages
