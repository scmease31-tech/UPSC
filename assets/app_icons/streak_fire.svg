<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Streak Fire — Multi-layered flame with ember particles -->
  <!-- Glow backdrop -->
  <ellipse cx="32" cy="50" rx="22" ry="8" fill="#FF6B6B" opacity="0.1"/>
  <!-- Outer flame -->
  <path d="M32,2 C32,2 16,18 16,34 C16,44 22,54 32,58 C42,54 48,44 48,34 C48,18 32,2 32,2Z" fill="#FF6B6B"/>
  <!-- Mid flame -->
  <path d="M32,12 C32,12 20,24 20,36 C20,44 26,50 32,54 C38,50 44,44 44,36 C44,24 32,12 32,12Z" fill="#FF8A65"/>
  <!-- Inner flame -->
  <path d="M32,20 C32,20 24,30 24,38 C24,44 28,48 32,50 C36,48 40,44 40,38 C40,30 32,20 32,20Z" fill="#FFB74D"/>
  <!-- Core bright flame -->
  <path d="M32,28 C32,28 28,34 28,40 C28,44 30,46 32,48 C34,46 36,44 36,40 C36,34 32,28 32,28Z" fill="#FFD54F"/>
  <!-- White-hot center -->
  <path d="M32,34 C32,34 30,38 30,42 C30,44 31,45 32,46 C33,45 34,44 34,42 C34,38 32,34 32,34Z" fill="#FFF9C4"/>
  <!-- Flame edge highlights -->
  <path d="M22,30 Q18,26 20,34" stroke="#FFCDD2" stroke-width="0.6" fill="none" opacity="0.4"/>
  <path d="M42,30 Q46,26 44,34" stroke="#FFCDD2" stroke-width="0.6" fill="none" opacity="0.4"/>
  <!-- Ember particles -->
  <circle cx="20" cy="16" r="1.5" fill="#FF6B6B" opacity="0.6"/>
  <circle cx="14" cy="20" r="1" fill="#FF8A65" opacity="0.5"/>
  <circle cx="44" cy="14" r="1.5" fill="#FF6B6B" opacity="0.6"/>
  <circle cx="48" cy="20" r="1" fill="#FFB74D" opacity="0.5"/>
  <circle cx="24" cy="8" r="1" fill="#FFB74D" opacity="0.4"/>
  <circle cx="40" cy="6" r="0.8" fill="#FF8A65" opacity="0.4"/>
  <circle cx="18" cy="12" r="0.7" fill="#FFD54F" opacity="0.3"/>
  <circle cx="46" cy="10" r="0.7" fill="#FFD54F" opacity="0.3"/>
  <!-- Streak number badge -->
  <circle cx="52" cy="50" r="7" fill="#FF6B6B"/>
  <circle cx="52" cy="50" r="5.5" fill="#FFEBEE"/>
  <text x="49" y="53" font-family="Arial" font-size="7" font-weight="bold" fill="#D32F2F">7</text>
</svg>
