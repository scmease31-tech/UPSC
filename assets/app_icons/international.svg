<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- International Relations — Globe with flags + handshake -->
  <!-- Globe shadow -->
  <ellipse cx="33" cy="57" rx="18" ry="3" fill="#FFCDD2" opacity="0.3"/>
  <!-- Globe -->
  <circle cx="32" cy="30" r="24" fill="#FFEBEE"/>
  <circle cx="32" cy="30" r="24" fill="none" stroke="#EF5350" stroke-width="1.5"/>
  <!-- Continents (abstract shapes) -->
  <path d="M20,18 Q24,14 30,16 Q34,18 36,14 Q40,12 42,18 Q44,22 40,24 Q38,26 34,22 Q30,20 26,22 Q22,24 20,18Z" fill="#EF9A9A" opacity="0.6"/>
  <path d="M16,30 Q18,26 24,28 Q28,30 26,34 Q24,38 18,36 Q14,34 16,30Z" fill="#EF9A9A" opacity="0.5"/>
  <path d="M36,30 Q40,28 46,32 Q48,36 44,40 Q40,42 38,38 Q34,34 36,30Z" fill="#EF9A9A" opacity="0.6"/>
  <path d="M26,40 Q30,38 34,42 Q36,46 32,48 Q28,50 26,44 Q24,42 26,40Z" fill="#EF9A9A" opacity="0.4"/>
  <!-- Latitude lines -->
  <ellipse cx="32" cy="30" rx="24" ry="8" fill="none" stroke="#FFCDD2" stroke-width="0.7"/>
  <ellipse cx="32" cy="20" rx="20" ry="4" fill="none" stroke="#FFCDD2" stroke-width="0.5"/>
  <ellipse cx="32" cy="40" rx="20" ry="4" fill="none" stroke="#FFCDD2" stroke-width="0.5"/>
  <!-- Longitude lines -->
  <ellipse cx="32" cy="30" rx="10" ry="24" fill="none" stroke="#FFCDD2" stroke-width="0.7"/>
  <line x1="32" y1="6" x2="32" y2="54" stroke="#FFCDD2" stroke-width="0.5"/>
  <!-- Equator -->
  <line x1="8" y1="30" x2="56" y2="30" stroke="#EF5350" stroke-width="0.5" opacity="0.5"/>
  <!-- Connection lines (representing diplomacy) -->
  <circle cx="20" cy="20" r="2" fill="#D32F2F"/>
  <circle cx="44" cy="24" r="2" fill="#D32F2F"/>
  <circle cx="32" cy="44" r="2" fill="#D32F2F"/>
  <line x1="20" y1="20" x2="44" y2="24" stroke="#D32F2F" stroke-width="0.7" stroke-dasharray="2 1"/>
  <line x1="44" y1="24" x2="32" y2="44" stroke="#D32F2F" stroke-width="0.7" stroke-dasharray="2 1"/>
  <line x1="32" y1="44" x2="20" y2="20" stroke="#D32F2F" stroke-width="0.7" stroke-dasharray="2 1"/>
  <!-- Small flags -->
  <line x1="8" y1="10" x2="8" y2="4" stroke="#616161" stroke-width="0.7"/>
  <rect x="8" y="4" width="6" height="4" rx="0.5" fill="#FF9800"/>
  <rect x="8" y="5.3" width="6" height="1.3" fill="white"/>
  <rect x="8" y="6.6" width="6" height="1.3" rx="0.5" fill="#4CAF50"/>
  <line x1="54" y1="10" x2="54" y2="4" stroke="#616161" stroke-width="0.7"/>
  <rect x="48" y="4" width="6" height="4" rx="0.5" fill="#2196F3"/>
  <rect x="48" y="5.3" width="6" height="1.4" fill="white"/>
  <rect x="48" y="6.7" width="6" height="1.3" rx="0.5" fill="#F44336"/>
</svg>
