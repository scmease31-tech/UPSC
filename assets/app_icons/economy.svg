<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Economy — Rupee symbol + growth chart + coins -->
  <!-- Background grid lines -->
  <line x1="8" y1="16" x2="8" y2="52" stroke="#E0F2F1" stroke-width="0.5"/>
  <line x1="20" y1="16" x2="20" y2="52" stroke="#E0F2F1" stroke-width="0.5"/>
  <line x1="32" y1="16" x2="32" y2="52" stroke="#E0F2F1" stroke-width="0.5"/>
  <line x1="44" y1="16" x2="44" y2="52" stroke="#E0F2F1" stroke-width="0.5"/>
  <line x1="56" y1="16" x2="56" y2="52" stroke="#E0F2F1" stroke-width="0.5"/>
  <line x1="8" y1="22" x2="56" y2="22" stroke="#E0F2F1" stroke-width="0.5"/>
  <line x1="8" y1="32" x2="56" y2="32" stroke="#E0F2F1" stroke-width="0.5"/>
  <line x1="8" y1="42" x2="56" y2="42" stroke="#E0F2F1" stroke-width="0.5"/>
  <!-- Axis lines -->
  <line x1="8" y1="52" x2="58" y2="52" stroke="#00897B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="14" x2="8" y2="52" stroke="#00897B" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bar chart with gradients -->
  <rect x="12" y="38" width="7" height="14" rx="1.5" fill="#B2DFDB"/>
  <rect x="12" y="38" width="7" height="3" rx="1.5" fill="#80CBC4" opacity="0.6"/>
  <rect x="22" y="32" width="7" height="20" rx="1.5" fill="#80CBC4"/>
  <rect x="22" y="32" width="7" height="3" rx="1.5" fill="#4DB6AC" opacity="0.6"/>
  <rect x="32" y="24" width="7" height="28" rx="1.5" fill="#4DB6AC"/>
  <rect x="32" y="24" width="7" height="3" rx="1.5" fill="#26A69A" opacity="0.6"/>
  <rect x="42" y="18" width="7" height="34" rx="1.5" fill="#00BFA6"/>
  <rect x="42" y="18" width="7" height="3" rx="1.5" fill="#00897B" opacity="0.6"/>
  <!-- Growth trend line -->
  <polyline points="15,35 25,29 35,21 45,14" stroke="#00695C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="15" cy="35" r="2" fill="#00695C"/>
  <circle cx="25" cy="29" r="2" fill="#00695C"/>
  <circle cx="35" cy="21" r="2" fill="#00695C"/>
  <circle cx="45" cy="14" r="2" fill="#00695C"/>
  <!-- Arrow tip -->
  <polygon points="45,10 49,16 43,14" fill="#00695C"/>
  <!-- Rupee symbol -->
  <circle cx="52" cy="8" r="6" fill="#00BFA6"/>
  <text x="49" y="12" font-family="Arial" font-size="10" font-weight="bold" fill="white">₹</text>
</svg>
