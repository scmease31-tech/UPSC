<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Bookmark — Detailed ribbon bookmark with saved articles -->
  <!-- Page behind -->
  <rect x="12" y="4" width="40" height="56" rx="3" fill="#FFF5F5" stroke="#FFCDD2" stroke-width="0.8"/>
  <line x1="18" y1="10" x2="46" y2="10" stroke="#FFCDD2" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="15" x2="46" y2="15" stroke="#FFEBEE" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="20" x2="40" y2="20" stroke="#FFEBEE" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="25" x2="46" y2="25" stroke="#FFEBEE" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="30" x2="42" y2="30" stroke="#FFEBEE" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="35" x2="46" y2="35" stroke="#FFEBEE" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="40" x2="38" y2="40" stroke="#FFEBEE" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="45" x2="46" y2="45" stroke="#FFEBEE" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="50" x2="44" y2="50" stroke="#FFEBEE" stroke-width="1" stroke-linecap="round"/>
  <!-- Bookmark ribbon (main) -->
  <path d="M6,2 L20,2 C21,2 22,3 22,4 L22,54 L14,46 L6,54 L6,4 C6,3 6,2 6,2Z" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
  <!-- Ribbon highlight -->
  <rect x="8" y="4" width="4" height="48" fill="#FF8A80" opacity="0.3" rx="1"/>
  <!-- Ribbon stitching -->
  <line x1="8" y1="6" x2="20" y2="6" stroke="#FFCDD2" stroke-width="0.4" stroke-dasharray="1.5 1.5"/>
  <line x1="8" y1="50" x2="20" y2="50" stroke="#FFCDD2" stroke-width="0.4" stroke-dasharray="1.5 1.5"/>
  <!-- Star on bookmark -->
  <polygon points="14,16 15.5,20 20,20.5 16.5,23 17.5,27 14,24.5 10.5,27 11.5,23 8,20.5 12.5,20" fill="#FFD54F"/>
  <!-- Heart on bookmark -->
  <path d="M14,32 C14,30 12,28 10,30 C8,32 10,34 14,38 C18,34 20,32 18,30 C16,28 14,30 14,32Z" fill="#FFCDD2"/>
  <!-- Second bookmark (smaller, behind) -->
  <path d="M44,2 L52,2 C53,2 54,3 54,4 L54,38 L48,32 L42,38 L42,4 C42,3 43,2 44,2Z" fill="#7C4DFF" opacity="0.6"/>
  <rect x="44" y="4" width="3" height="30" fill="#B388FF" opacity="0.2" rx="0.5"/>
  <!-- Page corner fold -->
  <path d="M52,56 L46,60 L52,60 Z" fill="#FFCDD2"/>
</svg>
