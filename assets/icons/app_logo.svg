<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Left page gradient: pink-magenta to deep purple -->
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F0ABFC"/>
      <stop offset="30%" stop-color="#D946EF"/>
      <stop offset="70%" stop-color="#A21CAF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Right page gradient: indigo to bright cyan -->
    <linearGradient id="rightGrad" x1="20%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="40%" stop-color="#3B82F6"/>
      <stop offset="75%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <!-- Bulb gradient: purple center -->
    <linearGradient id="bulbGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="40%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <!-- Sparkle gradient -->
    <linearGradient id="sparkleGrad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#E9D5FF"/>
      <stop offset="50%" stop-color="#D8B4FE"/>
      <stop offset="100%" stop-color="#F0ABFC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- ══════ FRONT PAGES (thick stroke, rounded) ══════ -->
  <!-- Left front page -->
  <path d="M130,168 Q128,176 128,192 L128,345 Q130,365 144,377 Q158,388 188,394 Q218,400 252,408 L252,198 Q224,186 196,178 Q166,170 142,168 Q134,167 130,168 Z"
        fill="none" stroke="url(#leftGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right front page -->
  <path d="M382,168 Q384,176 384,192 L384,345 Q382,365 368,377 Q354,388 324,394 Q294,400 260,408 L260,198 Q288,186 316,178 Q346,170 370,168 Q378,167 382,168 Z"
        fill="none" stroke="url(#rightGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Book spine/bottom curve -->
  <path d="M195,400 Q256,422 317,400" fill="none" stroke="url(#bulbGrad)" stroke-width="7" stroke-linecap="round"/>

  <!-- ══════ LIGHTBULB ══════ -->
  <!-- Bulb glass (circle) -->
  <circle cx="256" cy="268" r="52" fill="none" stroke="url(#bulbGrad)" stroke-width="7.5"/>

  <!-- Filament / leaf sprouts -->
  <path d="M245,296 Q243,278 248,264 Q253,254 256,246" fill="none" stroke="url(#bulbGrad)" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M267,296 Q269,278 264,264 Q259,254 256,246" fill="none" stroke="url(#bulbGrad)" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Center stem -->
  <line x1="256" y1="296" x2="256" y2="280" stroke="url(#bulbGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Bulb neck sides -->
  <path d="M238,310 Q238,320 240,326" fill="none" stroke="url(#bulbGrad)" stroke-width="5" stroke-linecap="round"/>
  <path d="M274,310 Q274,320 272,326" fill="none" stroke="url(#bulbGrad)" stroke-width="5" stroke-linecap="round"/>

  <!-- Screw base lines -->
  <line x1="238" y1="328" x2="274" y2="328" stroke="url(#bulbGrad)" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="241" y1="340" x2="271" y2="340" stroke="url(#bulbGrad)" stroke-width="5" stroke-linecap="round"/>
  <line x1="245" y1="352" x2="267" y2="352" stroke="url(#bulbGrad)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- ══════ SPARKLE (4-pointed star) ══════ -->
  <path d="M256,108 C258,126 258,132 268,138 L278,142 C268,146 258,146 258,164 L256,172 C254,158 254,146 244,142 L234,138 C244,134 254,132 254,118 Z"
        fill="url(#sparkleGrad)"/>
  <!-- Sparkle center hot spot -->
  <circle cx="256" cy="142" r="4.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Small accent dots -->
  <circle cx="225" cy="138" r="5.5" fill="url(#bulbGrad)" opacity="0.85"/>
  <circle cx="288" cy="134" r="4.5" fill="#22D3EE" opacity="0.75"/>
</svg>