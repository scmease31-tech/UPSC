<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Revision — Circular arrows with checkmarks + brain refresh -->
  <!-- Outer circular track -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#E0F2F1" stroke-width="3"/>
  <!-- Clockwise arrow arc (top half) -->
  <path d="M32,8 C44,8 54,16 56,28" stroke="#00BFA6" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Arrow head (right) -->
  <polygon points="58,28 54,34 52,26" fill="#00BFA6"/>
  <!-- Counter-clockwise arrow arc (bottom half) -->
  <path d="M32,56 C20,56 10,48 8,36" stroke="#26A69A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Arrow head (left) -->
  <polygon points="6,36 10,30 12,38" fill="#26A69A"/>
  <!-- Dashed remaining arcs -->
  <path d="M56,36 C54,46 46,54 36,56" stroke="#80CBC4" stroke-width="2" stroke-dasharray="3 3" fill="none" stroke-linecap="round"/>
  <path d="M8,28 C10,18 18,10 28,8" stroke="#80CBC4" stroke-width="2" stroke-dasharray="3 3" fill="none" stroke-linecap="round"/>
  <!-- Center circle with play/refresh -->
  <circle cx="32" cy="32" r="10" fill="#00BFA6"/>
  <circle cx="32" cy="32" r="8" fill="#E0F2F1"/>
  <!-- Center refresh icon -->
  <path d="M28,28 C28,26 30,24 32,24 C35,24 37,26 37,29" stroke="#00897B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <polygon points="38,29 36,32 40,31" fill="#00897B"/>
  <path d="M36,36 C36,38 34,40 32,40 C29,40 27,38 27,35" stroke="#00897B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <polygon points="26,35 28,32 24,33" fill="#00897B"/>
  <!-- Progress checkmarks orbiting -->
  <circle cx="32" cy="6" r="4" fill="#4CAF50"/>
  <polyline points="30,6 32,8 35,4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="56" cy="32" r="3" fill="#FFB74D"/>
  <polyline points="54.5,32 56,33.5 58,30.5" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="32" cy="58" r="3" fill="#EF5350"/>
  <text x="30.5" y="60" font-family="Arial" font-size="5" font-weight="bold" fill="white">!</text>
</svg>
