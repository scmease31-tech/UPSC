<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Calendar — Detailed daily planner with streaks -->
  <!-- Shadow -->
  <rect x="10" y="10" width="46" height="48" rx="3" fill="#B2DFDB" opacity="0.3"/>
  <!-- Calendar body -->
  <rect x="8" y="8" width="48" height="50" rx="4" fill="#FAFAFA" stroke="#00897B" stroke-width="1.2"/>
  <!-- Header -->
  <rect x="8" y="8" width="48" height="14" rx="4" fill="#00BFA6"/>
  <rect x="8" y="18" width="48" height="4" fill="#00BFA6"/>
  <!-- Month title -->
  <rect x="18" y="11" width="28" height="3" rx="1" fill="white" opacity="0.3"/>
  <!-- Hanging hooks -->
  <rect x="20" y="4" width="3" height="10" rx="1.5" fill="#00897B"/>
  <rect x="20" y="4" width="1.5" height="10" rx="0.75" fill="#26A69A" opacity="0.4"/>
  <rect x="41" y="4" width="3" height="10" rx="1.5" fill="#00897B"/>
  <rect x="41" y="4" width="1.5" height="10" rx="0.75" fill="#26A69A" opacity="0.4"/>
  <!-- Day headers -->
  <text x="12" y="25" font-family="Arial" font-size="3.5" fill="#009688" font-weight="bold">S</text>
  <text x="18" y="25" font-family="Arial" font-size="3.5" fill="#616161" font-weight="bold">M</text>
  <text x="25" y="25" font-family="Arial" font-size="3.5" fill="#616161" font-weight="bold">T</text>
  <text x="31" y="25" font-family="Arial" font-size="3.5" fill="#616161" font-weight="bold">W</text>
  <text x="38" y="25" font-family="Arial" font-size="3.5" fill="#616161" font-weight="bold">T</text>
  <text x="44" y="25" font-family="Arial" font-size="3.5" fill="#616161" font-weight="bold">F</text>
  <text x="50" y="25" font-family="Arial" font-size="3.5" fill="#009688" font-weight="bold">S</text>
  <!-- Divider -->
  <line x1="10" y1="27" x2="54" y2="27" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Week 1 -->
  <text x="13" y="33" font-family="Arial" font-size="4" fill="#9E9E9E">1</text>
  <text x="19" y="33" font-family="Arial" font-size="4" fill="#424242">2</text>
  <text x="25" y="33" font-family="Arial" font-size="4" fill="#424242">3</text>
  <text x="32" y="33" font-family="Arial" font-size="4" fill="#424242">4</text>
  <text x="38" y="33" font-family="Arial" font-size="4" fill="#424242">5</text>
  <text x="44" y="33" font-family="Arial" font-size="4" fill="#424242">6</text>
  <text x="50" y="33" font-family="Arial" font-size="4" fill="#9E9E9E">7</text>
  <!-- Week 2 with streaks -->
  <text x="13" y="39" font-family="Arial" font-size="4" fill="#9E9E9E">8</text>
  <circle cx="20" cy="37.5" r="3.5" fill="#E8F5E9"/>
  <text x="19" y="39" font-family="Arial" font-size="4" fill="#2E7D32">9</text>
  <circle cx="27" cy="37.5" r="3.5" fill="#E8F5E9"/>
  <text x="24" y="39" font-family="Arial" font-size="4" fill="#2E7D32">10</text>
  <circle cx="33" cy="37.5" r="3.5" fill="#E8F5E9"/>
  <text x="31" y="39" font-family="Arial" font-size="4" fill="#2E7D32">11</text>
  <text x="37" y="39" font-family="Arial" font-size="4" fill="#424242">12</text>
  <text x="43" y="39" font-family="Arial" font-size="4" fill="#424242">13</text>
  <text x="49" y="39" font-family="Arial" font-size="4" fill="#9E9E9E">14</text>
  <!-- Week 3 — today highlighted -->
  <text x="12" y="45" font-family="Arial" font-size="4" fill="#9E9E9E">15</text>
  <text x="18" y="45" font-family="Arial" font-size="4" fill="#424242">16</text>
  <text x="24" y="45" font-family="Arial" font-size="4" fill="#424242">17</text>
  <!-- Today marker -->
  <circle cx="33" cy="43.5" r="4" fill="#00BFA6"/>
  <text x="31" y="45" font-family="Arial" font-size="4" font-weight="bold" fill="white">18</text>
  <text x="37" y="45" font-family="Arial" font-size="4" fill="#BDBDBD">19</text>
  <text x="43" y="45" font-family="Arial" font-size="4" fill="#BDBDBD">20</text>
  <text x="49" y="45" font-family="Arial" font-size="4" fill="#BDBDBD">21</text>
  <!-- Week 4 -->
  <text x="12" y="51" font-family="Arial" font-size="4" fill="#BDBDBD">22</text>
  <text x="18" y="51" font-family="Arial" font-size="4" fill="#BDBDBD">23</text>
  <text x="24" y="51" font-family="Arial" font-size="4" fill="#BDBDBD">24</text>
  <text x="31" y="51" font-family="Arial" font-size="4" fill="#BDBDBD">25</text>
  <text x="37" y="51" font-family="Arial" font-size="4" fill="#BDBDBD">26</text>
  <text x="43" y="51" font-family="Arial" font-size="4" fill="#BDBDBD">27</text>
  <text x="49" y="51" font-family="Arial" font-size="4" fill="#BDBDBD">28</text>
</svg>
