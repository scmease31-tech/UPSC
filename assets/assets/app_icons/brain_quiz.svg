<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Brain / Quiz — Detailed brain with question marks -->
  <!-- Brain outline -->
  <path d="M32,8 C24,8 18,12 16,18 C12,18 8,22 8,28 C8,34 12,38 16,38 C16,42 18,46 22,48 L22,52 C22,54 24,56 26,56 L38,56 C40,56 42,54 42,52 L42,48 C46,46 48,42 48,38 C52,38 56,34 56,28 C56,22 52,18 48,18 C46,12 40,8 32,8Z" fill="#EDE7F6" stroke="#7C4DFF" stroke-width="1.5"/>
  <!-- Left hemisphere folds -->
  <path d="M16,22 Q20,18 24,24 Q26,28 22,32" stroke="#B39DDB" stroke-width="1.2" fill="none"/>
  <path d="M14,30 Q18,26 22,30 Q24,34 18,38" stroke="#B39DDB" stroke-width="1" fill="none"/>
  <path d="M20,16 Q24,14 26,20" stroke="#D1C4E9" stroke-width="1" fill="none"/>
  <!-- Right hemisphere folds -->
  <path d="M48,22 Q44,18 40,24 Q38,28 42,32" stroke="#B39DDB" stroke-width="1.2" fill="none"/>
  <path d="M50,30 Q46,26 42,30 Q40,34 46,38" stroke="#B39DDB" stroke-width="1" fill="none"/>
  <path d="M44,16 Q40,14 38,20" stroke="#D1C4E9" stroke-width="1" fill="none"/>
  <!-- Central fissure -->
  <path d="M32,10 Q30,20 32,30 Q34,40 32,48" stroke="#9575CD" stroke-width="1" fill="none"/>
  <!-- Synaptic sparks -->
  <circle cx="20" cy="20" r="1.5" fill="#7C4DFF" opacity="0.6"/>
  <circle cx="44" cy="20" r="1.5" fill="#7C4DFF" opacity="0.6"/>
  <circle cx="28" cy="36" r="1" fill="#B388FF" opacity="0.5"/>
  <circle cx="36" cy="36" r="1" fill="#B388FF" opacity="0.5"/>
  <circle cx="32" cy="16" r="1" fill="#7C4DFF" opacity="0.7"/>
  <!-- Connection dots -->
  <line x1="20" y1="20" x2="28" y2="36" stroke="#B388FF" stroke-width="0.5" stroke-dasharray="1 1.5"/>
  <line x1="44" y1="20" x2="36" y2="36" stroke="#B388FF" stroke-width="0.5" stroke-dasharray="1 1.5"/>
  <!-- Base / stem -->
  <rect x="26" y="48" width="12" height="2" rx="1" fill="#9575CD"/>
  <rect x="24" y="50" width="16" height="2" rx="1" fill="#7C4DFF"/>
  <rect x="26" y="52" width="12" height="2" rx="1" fill="#9575CD"/>
  <rect x="28" y="54" width="8" height="2" rx="1" fill="#7C4DFF"/>
  <!-- Question mark sparks around brain -->
  <text x="4" y="14" font-family="Arial" font-size="8" font-weight="bold" fill="#7C4DFF" opacity="0.5">?</text>
  <text x="54" y="14" font-family="Arial" font-size="6" font-weight="bold" fill="#B388FF" opacity="0.4">?</text>
  <text x="2" y="44" font-family="Arial" font-size="6" font-weight="bold" fill="#B388FF" opacity="0.4">?</text>
  <text x="56" y="44" font-family="Arial" font-size="8" font-weight="bold" fill="#7C4DFF" opacity="0.5">?</text>
</svg>
