<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Indian Parliament / Sansad Bhavan inspired -->
  <!-- Ground / Platform -->
  <rect x="4" y="52" width="56" height="6" rx="3" fill="#5E35B1"/>
  <rect x="4" y="52" width="56" height="2" rx="1" fill="#7C4DFF" opacity="0.7"/>
  <!-- Base steps -->
  <rect x="7" y="48" width="50" height="5" rx="2" fill="#7C4DFF"/>
  <rect x="7" y="48" width="50" height="1.5" rx="0.75" fill="#9575CD" opacity="0.5"/>
  <!-- Pillar bases -->
  <rect x="11" y="46" width="6" height="3" rx="1" fill="#9575CD"/>
  <rect x="21" y="46" width="6" height="3" rx="1" fill="#9575CD"/>
  <rect x="37" y="46" width="6" height="3" rx="1" fill="#9575CD"/>
  <rect x="47" y="46" width="6" height="3" rx="1" fill="#9575CD"/>
  <!-- Pillars with fluting detail -->
  <rect x="12" y="26" width="4" height="20" rx="1" fill="#B39DDB"/>
  <rect x="13" y="26" width="0.5" height="20" fill="#D1C4E9" opacity="0.6"/>
  <rect x="22" y="26" width="4" height="20" rx="1" fill="#B39DDB"/>
  <rect x="23" y="26" width="0.5" height="20" fill="#D1C4E9" opacity="0.6"/>
  <rect x="38" y="26" width="4" height="20" rx="1" fill="#B39DDB"/>
  <rect x="39" y="26" width="0.5" height="20" fill="#D1C4E9" opacity="0.6"/>
  <rect x="48" y="26" width="4" height="20" rx="1" fill="#B39DDB"/>
  <rect x="49" y="26" width="0.5" height="20" fill="#D1C4E9" opacity="0.6"/>
  <!-- Pillar capitals -->
  <rect x="11" y="24" width="6" height="3" rx="1" fill="#9575CD"/>
  <rect x="21" y="24" width="6" height="3" rx="1" fill="#9575CD"/>
  <rect x="37" y="24" width="6" height="3" rx="1" fill="#9575CD"/>
  <rect x="47" y="24" width="6" height="3" rx="1" fill="#9575CD"/>
  <!-- Entablature / Beam -->
  <rect x="5" y="21" width="54" height="4" rx="1.5" fill="#7C4DFF"/>
  <rect x="5" y="21" width="54" height="1.5" rx="0.75" fill="#9575CD" opacity="0.4"/>
  <!-- Triangular Pediment -->
  <polygon points="32,5 5,21 59,21" fill="#9C27B0"/>
  <polygon points="32,7 9,20 55,20" fill="#AB47BC" opacity="0.5"/>
  <!-- Ashoka Chakra in pediment -->
  <circle cx="32" cy="14" r="4.5" fill="none" stroke="#E1BEE7" stroke-width="1"/>
  <circle cx="32" cy="14" r="2" fill="#E1BEE7"/>
  <!-- Chakra spokes -->
  <line x1="32" y1="10" x2="32" y2="18" stroke="#E1BEE7" stroke-width="0.5"/>
  <line x1="28" y1="14" x2="36" y2="14" stroke="#E1BEE7" stroke-width="0.5"/>
  <line x1="29" y1="11" x2="35" y2="17" stroke="#E1BEE7" stroke-width="0.5"/>
  <line x1="35" y1="11" x2="29" y2="17" stroke="#E1BEE7" stroke-width="0.5"/>
  <!-- Central door -->
  <rect x="28" y="34" width="8" height="14" rx="4" fill="#4527A0" opacity="0.5"/>
  <rect x="29" y="36" width="6" height="12" rx="3" fill="#311B92" opacity="0.4"/>
  <!-- Side windows -->
  <rect x="16" y="30" width="4" height="6" rx="2" fill="#4527A0" opacity="0.35"/>
  <rect x="44" y="30" width="4" height="6" rx="2" fill="#4527A0" opacity="0.35"/>
  <!-- Flag on top -->
  <line x1="32" y1="2" x2="32" y2="5" stroke="#7C4DFF" stroke-width="1"/>
  <rect x="32" y="2" width="5" height="3" rx="0.5" fill="#FF9800"/>
  <rect x="32" y="3" width="5" height="1" fill="#FFFFFF"/>
  <rect x="32" y="4" width="5" height="1" rx="0.5" fill="#4CAF50"/>
</svg>
