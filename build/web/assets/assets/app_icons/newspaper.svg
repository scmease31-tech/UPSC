<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Newspaper — The Hindu / Indian Express style -->
  <!-- Paper shadow -->
  <rect x="10" y="10" width="46" height="48" rx="2" fill="#E0E0E0"/>
  <!-- Main paper -->
  <rect x="8" y="6" width="48" height="50" rx="3" fill="#FAFAFA" stroke="#9E9E9E" stroke-width="1"/>
  <!-- Masthead area -->
  <rect x="8" y="6" width="48" height="10" rx="3" fill="#F5F5F5"/>
  <rect x="8" y="14" width="48" height="2" fill="#F5F5F5"/>
  <!-- Newspaper title bar -->
  <rect x="16" y="8" width="32" height="3" rx="1" fill="#37474F"/>
  <line x1="14" y1="13" x2="50" y2="13" stroke="#9E9E9E" stroke-width="0.5"/>
  <!-- Headline -->
  <rect x="12" y="17" width="28" height="2.5" rx="0.5" fill="#212121"/>
  <rect x="12" y="21" width="22" height="1.5" rx="0.5" fill="#616161"/>
  <!-- Featured image placeholder -->
  <rect x="12" y="25" width="20" height="14" rx="2" fill="#90CAF9"/>
  <path d="M14,37 L18,31 L22,35 L26,29 L30,37 Z" fill="#64B5F6" opacity="0.7"/>
  <circle cx="17" cy="29" r="2" fill="#BBDEFB"/>
  <!-- Text columns -->
  <line x1="36" y1="25" x2="52" y2="25" stroke="#BDBDBD" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="28" x2="52" y2="28" stroke="#E0E0E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="31" x2="50" y2="31" stroke="#E0E0E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="34" x2="52" y2="34" stroke="#E0E0E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="37" x2="48" y2="37" stroke="#E0E0E0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Divider -->
  <line x1="12" y1="41" x2="52" y2="41" stroke="#BDBDBD" stroke-width="0.5"/>
  <!-- Bottom article text -->
  <rect x="12" y="43" width="16" height="1.5" rx="0.5" fill="#424242"/>
  <line x1="12" y1="46" x2="52" y2="46" stroke="#E0E0E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="49" x2="52" y2="49" stroke="#E0E0E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="52" x2="40" y2="52" stroke="#E0E0E0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Fold crease -->
  <line x1="8" y1="32" x2="56" y2="32" stroke="#E8E8E8" stroke-width="0.3" stroke-dasharray="3 2"/>
</svg>
