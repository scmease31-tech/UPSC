<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Study Book — Open book with pages + pen + bookmark -->
  <!-- Book spine shadow -->
  <line x1="32" y1="10" x2="32" y2="56" stroke="#00695C" stroke-width="2"/>
  <!-- Left page -->
  <path d="M32,12 C28,10 18,8 6,10 L6,54 C18,52 28,54 32,56" fill="#E8F5E9" stroke="#00897B" stroke-width="1.2"/>
  <!-- Right page -->
  <path d="M32,12 C36,10 46,8 58,10 L58,54 C46,52 36,54 32,56" fill="#F1F8E9" stroke="#00897B" stroke-width="1.2"/>
  <!-- Left page lines -->
  <line x1="12" y1="18" x2="28" y2="16" stroke="#A5D6A7" stroke-width="1" stroke-linecap="round"/>
  <line x1="12" y1="23" x2="28" y2="21" stroke="#C8E6C9" stroke-width="1" stroke-linecap="round"/>
  <line x1="12" y1="28" x2="26" y2="26" stroke="#C8E6C9" stroke-width="1" stroke-linecap="round"/>
  <line x1="12" y1="33" x2="28" y2="31" stroke="#C8E6C9" stroke-width="1" stroke-linecap="round"/>
  <line x1="12" y1="38" x2="24" y2="36" stroke="#C8E6C9" stroke-width="1" stroke-linecap="round"/>
  <line x1="12" y1="43" x2="28" y2="41" stroke="#C8E6C9" stroke-width="1" stroke-linecap="round"/>
  <line x1="12" y1="48" x2="26" y2="46" stroke="#C8E6C9" stroke-width="1" stroke-linecap="round"/>
  <!-- Right page lines -->
  <line x1="36" y1="16" x2="52" y2="18" stroke="#A5D6A7" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="21" x2="52" y2="23" stroke="#C8E6C9" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="26" x2="50" y2="28" stroke="#C8E6C9" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="31" x2="52" y2="33" stroke="#C8E6C9" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="36" x2="48" y2="38" stroke="#C8E6C9" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="41" x2="52" y2="43" stroke="#C8E6C9" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="46" x2="50" y2="48" stroke="#C8E6C9" stroke-width="1" stroke-linecap="round"/>
  <!-- Highlighted paragraph on left -->
  <rect x="12" y="22" width="14" height="7" rx="1" fill="#FFE082" opacity="0.35"/>
  <!-- Bookmark ribbon -->
  <path d="M24,8 L24,22 L26,20 L28,22 L28,8" fill="#EF5350"/>
  <!-- Pen on right page -->
  <line x1="48" y1="36" x2="40" y2="50" stroke="#FF8F00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="50" x2="39" y2="52" stroke="#37474F" stroke-width="1" stroke-linecap="round"/>
  <circle cx="48" cy="36" r="1" fill="#FF8F00"/>
  <!-- Page corner curl -->
  <path d="M58,50 L52,54 L58,54 Z" fill="#C8E6C9"/>
  <path d="M58,50 L52,54 L58,54 Z" fill="none" stroke="#00897B" stroke-width="0.5"/>
  <!-- Bottom book edge -->
  <path d="M6,54 Q18,56 32,56 Q46,56 58,54" stroke="#00897B" stroke-width="1.5" fill="none"/>
  <!-- Multiple book edges (pages) -->
  <line x1="6" y1="55" x2="6" y2="57" stroke="#B2DFDB" stroke-width="1.5"/>
  <line x1="58" y1="55" x2="58" y2="57" stroke="#B2DFDB" stroke-width="1.5"/>
</svg>
