<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Environment — Earth + leaf + water drop -->
  <!-- Ground -->
  <path d="M4,56 Q16,50 32,52 Q48,54 60,56 L60,60 L4,60 Z" fill="#795548" opacity="0.3"/>
  <!-- Tree trunk -->
  <rect x="29" y="38" width="6" height="18" rx="2" fill="#6D4C41"/>
  <rect x="30" y="38" width="1.5" height="18" rx="0.5" fill="#8D6E63" opacity="0.5"/>
  <!-- Roots -->
  <path d="M29,54 Q24,56 20,58" stroke="#6D4C41" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M35,54 Q40,56 44,58" stroke="#6D4C41" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Tree canopy — layered for depth -->
  <ellipse cx="32" cy="26" rx="20" ry="18" fill="#388E3C"/>
  <ellipse cx="24" cy="22" rx="12" ry="14" fill="#43A047"/>
  <ellipse cx="40" cy="24" rx="10" ry="12" fill="#4CAF50"/>
  <ellipse cx="32" cy="18" rx="8" ry="10" fill="#66BB6A"/>
  <ellipse cx="28" cy="14" rx="5" ry="6" fill="#81C784"/>
  <ellipse cx="38" cy="16" rx="4" ry="5" fill="#A5D6A7"/>
  <!-- Leaf vein highlights -->
  <path d="M22,28 Q28,20 34,28" stroke="#2E7D32" stroke-width="0.7" fill="none" opacity="0.4"/>
  <path d="M36,26 Q40,18 44,26" stroke="#2E7D32" stroke-width="0.7" fill="none" opacity="0.4"/>
  <!-- Small birds -->
  <path d="M12,12 Q14,10 16,12" stroke="#37474F" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M10,14 Q12,12 14,14" stroke="#37474F" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Sun -->
  <circle cx="54" cy="8" r="5" fill="#FFD54F"/>
  <circle cx="54" cy="8" r="3" fill="#FFECB3"/>
  <!-- Sun rays -->
  <line x1="54" y1="1" x2="54" y2="3" stroke="#FFD54F" stroke-width="1" stroke-linecap="round"/>
  <line x1="60" y1="8" x2="62" y2="8" stroke="#FFD54F" stroke-width="1" stroke-linecap="round"/>
  <line x1="59" y1="3" x2="60" y2="4" stroke="#FFD54F" stroke-width="1" stroke-linecap="round"/>
  <line x1="59" y1="13" x2="60" y2="12" stroke="#FFD54F" stroke-width="1" stroke-linecap="round"/>
  <!-- Small grass -->
  <line x1="14" y1="56" x2="12" y2="52" stroke="#66BB6A" stroke-width="1" stroke-linecap="round"/>
  <line x1="16" y1="55" x2="16" y2="51" stroke="#81C784" stroke-width="1" stroke-linecap="round"/>
  <line x1="48" y1="55" x2="50" y2="51" stroke="#66BB6A" stroke-width="1" stroke-linecap="round"/>
  <line x1="50" y1="54" x2="50" y2="50" stroke="#81C784" stroke-width="1" stroke-linecap="round"/>
</svg>
