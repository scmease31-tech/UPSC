<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- History — Ancient scroll + hourglass + monument -->
  <!-- Scroll background -->
  <path d="M12,10 L12,50 Q12,54 16,54 L48,54 Q52,54 52,50 L52,14 Q52,10 48,10 Z" fill="#EFEBE9" stroke="#8D6E63" stroke-width="1.2"/>
  <!-- Scroll top roll -->
  <ellipse cx="12" cy="10" rx="3" ry="4" fill="#A1887F"/>
  <ellipse cx="12" cy="10" rx="1.5" ry="4" fill="#8D6E63"/>
  <ellipse cx="52" cy="10" rx="3" ry="4" fill="#A1887F"/>
  <ellipse cx="52" cy="10" rx="1.5" ry="4" fill="#8D6E63"/>
  <!-- Scroll bottom roll -->
  <ellipse cx="12" cy="54" rx="3" ry="3" fill="#A1887F"/>
  <ellipse cx="12" cy="54" rx="1.5" ry="3" fill="#8D6E63"/>
  <ellipse cx="52" cy="54" rx="3" ry="3" fill="#A1887F"/>
  <ellipse cx="52" cy="54" rx="1.5" ry="3" fill="#8D6E63"/>
  <!-- Aged paper texture lines -->
  <line x1="18" y1="14" x2="48" y2="14" stroke="#D7CCC8" stroke-width="0.3"/>
  <line x1="18" y1="50" x2="48" y2="50" stroke="#D7CCC8" stroke-width="0.3"/>
  <!-- Written text lines -->
  <line x1="18" y1="18" x2="46" y2="18" stroke="#BCAAA4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="23" x2="44" y2="23" stroke="#D7CCC8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="28" x2="40" y2="28" stroke="#D7CCC8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="33" x2="46" y2="33" stroke="#D7CCC8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="38" x2="38" y2="38" stroke="#D7CCC8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="43" x2="42" y2="43" stroke="#D7CCC8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="48" x2="34" y2="48" stroke="#D7CCC8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Ashoka pillar / Lion capital (small) -->
  <rect x="38" y="36" width="8" height="2" rx="1" fill="#FF8F00"/>
  <rect x="40" y="26" width="4" height="10" rx="0.5" fill="#FFB74D"/>
  <rect x="39" y="24" width="6" height="3" rx="1" fill="#FF8F00"/>
  <!-- Lions (simplified) -->
  <circle cx="41" cy="22" r="2" fill="#FF8F00"/>
  <circle cx="45" cy="22" r="2" fill="#FF8F00"/>
  <rect x="40" y="20" width="6" height="2" rx="1" fill="#FFB74D"/>
  <!-- Hourglass at corner -->
  <path d="M4,2 L14,2 L10,10 L14,18 L4,18 L8,10 Z" fill="none" stroke="#8D6E63" stroke-width="1.2"/>
  <path d="M6,4 L12,4 L9.5,9 Z" fill="#FFCC80" opacity="0.6"/>
  <path d="M8,11 L9,18 L10,11 Z" fill="#FFCC80" opacity="0.4"/>
  <!-- Sand particles -->
  <circle cx="9" cy="10" r="0.5" fill="#FFCC80"/>
  <circle cx="9" cy="12" r="0.3" fill="#FFCC80"/>
</svg>
