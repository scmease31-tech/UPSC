<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Geography — India map outline + compass + terrain -->
  <!-- Map paper background -->
  <rect x="6" y="4" width="52" height="52" rx="3" fill="#FFF8E1" stroke="#00897B" stroke-width="1.5"/>
  <rect x="6" y="4" width="52" height="4" rx="3" fill="#E0F2F1" opacity="0.4"/>
  <!-- Grid lines (topographic) -->
  <line x1="6" y1="14" x2="58" y2="14" stroke="#B2DFDB" stroke-width="0.4"/>
  <line x1="6" y1="24" x2="58" y2="24" stroke="#B2DFDB" stroke-width="0.4"/>
  <line x1="6" y1="34" x2="58" y2="34" stroke="#B2DFDB" stroke-width="0.4"/>
  <line x1="6" y1="44" x2="58" y2="44" stroke="#B2DFDB" stroke-width="0.4"/>
  <line x1="16" y1="4" x2="16" y2="56" stroke="#B2DFDB" stroke-width="0.4"/>
  <line x1="26" y1="4" x2="26" y2="56" stroke="#B2DFDB" stroke-width="0.4"/>
  <line x1="36" y1="4" x2="36" y2="56" stroke="#B2DFDB" stroke-width="0.4"/>
  <line x1="46" y1="4" x2="46" y2="56" stroke="#B2DFDB" stroke-width="0.4"/>
  <!-- Simplified India-like peninsula shape -->
  <path d="M28,10 L24,12 L22,16 L20,18 L18,20 L16,24 L18,28 L20,30 L22,34 L24,36 L26,38 L28,42 L30,44 L32,48 L34,44 L36,40 L38,36 L40,32 L42,28 L44,24 L42,20 L40,16 L38,12 L34,10 Z" fill="#80CBC4" stroke="#00897B" stroke-width="1.2"/>
  <!-- Himalaya mountains at top -->
  <polygon points="22,16 25,10 28,16" fill="#4DB6AC" opacity="0.5"/>
  <polygon points="28,14 31,8 34,14" fill="#4DB6AC" opacity="0.6"/>
  <polygon points="34,14 37,9 40,14" fill="#4DB6AC" opacity="0.5"/>
  <!-- Rivers -->
  <path d="M30,16 Q28,24 26,32 Q24,38 28,44" stroke="#29B6F6" stroke-width="0.8" fill="none"/>
  <path d="M36,18 Q38,26 36,34" stroke="#29B6F6" stroke-width="0.6" fill="none"/>
  <!-- Map pin -->
  <path d="M44,36 C40,36 38,39 38,42 C38,46 44,52 44,52 C44,52 50,46 50,42 C50,39 48,36 44,36Z" fill="#F44336"/>
  <circle cx="44" cy="41" r="2.5" fill="#FFCDD2"/>
  <!-- Compass rose -->
  <circle cx="12" cy="48" r="5" fill="none" stroke="#00897B" stroke-width="1"/>
  <polygon points="12,43 13,47 12,45 11,47" fill="#F44336"/>
  <polygon points="12,53 13,49 12,51 11,49" fill="#616161"/>
  <line x1="7" y1="48" x2="17" y2="48" stroke="#00897B" stroke-width="0.5"/>
  <text x="11" y="44" font-family="Arial" font-size="3" font-weight="bold" fill="#F44336">N</text>
  <!-- Scale bar -->
  <line x1="36" y1="54" x2="52" y2="54" stroke="#00897B" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="52" x2="36" y2="56" stroke="#00897B" stroke-width="0.7"/>
  <line x1="52" y1="52" x2="52" y2="56" stroke="#00897B" stroke-width="0.7"/>
  <!-- Fold crease -->
  <line x1="32" y1="4" x2="32" y2="56" stroke="#D7CCC8" stroke-width="0.3" stroke-dasharray="2 2"/>
</svg>
