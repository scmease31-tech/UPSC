<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Trophy — Detailed cup with handles + base + laurel -->
  <!-- Trophy glow -->
  <ellipse cx="32" cy="26" rx="20" ry="18" fill="#FFF8E1" opacity="0.3"/>
  <!-- Left handle -->
  <path d="M18,18 C10,18 6,24 6,30 C6,36 10,40 18,38" stroke="#FFB300" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M18,20 C12,20 8,24 8,30 C8,34 12,38 18,36" stroke="#FFD54F" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Right handle -->
  <path d="M46,18 C54,18 58,24 58,30 C58,36 54,40 46,38" stroke="#FFB300" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M46,20 C52,20 56,24 56,30 C56,34 52,38 46,36" stroke="#FFD54F" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Cup body -->
  <path d="M18,14 L46,14 L44,38 C42,44 38,46 32,46 C26,46 22,44 20,38 Z" fill="#FFD54F" stroke="#FF8F00" stroke-width="1.5"/>
  <!-- Cup shine -->
  <path d="M22,16 L26,16 L24,34 L22,36 Z" fill="#FFECB3" opacity="0.6"/>
  <!-- Cup rim -->
  <rect x="16" y="12" width="32" height="4" rx="2" fill="#FFB300"/>
  <rect x="16" y="12" width="32" height="1.5" rx="0.75" fill="#FFE082" opacity="0.6"/>
  <!-- Star on cup -->
  <polygon points="32,22 33.5,26 38,26.5 34.5,29 35.5,33.5 32,31 28.5,33.5 29.5,29 26,26.5 30.5,26" fill="#FF8F00"/>
  <polygon points="32,23.5 33,26 36,26.5 34,28.5 34.5,31.5 32,30 29.5,31.5 30,28.5 28,26.5 31,26" fill="#FFB300"/>
  <!-- Stem -->
  <rect x="29" y="46" width="6" height="6" rx="1" fill="#FF8F00"/>
  <rect x="30" y="46" width="2" height="6" rx="0.5" fill="#FFB300" opacity="0.4"/>
  <!-- Base -->
  <rect x="22" y="52" width="20" height="4" rx="2" fill="#FF8F00"/>
  <rect x="20" y="54" width="24" height="4" rx="2" fill="#E65100"/>
  <rect x="20" y="54" width="24" height="1.5" rx="0.75" fill="#FF8F00" opacity="0.4"/>
  <!-- Laurel wreath (left) -->
  <path d="M10,48 Q12,44 14,48 Q12,50 10,48Z" fill="#81C784"/>
  <path d="M12,46 Q14,42 16,46 Q14,48 12,46Z" fill="#66BB6A"/>
  <path d="M14,44 Q16,40 18,44 Q16,46 14,44Z" fill="#81C784"/>
  <!-- Laurel wreath (right) -->
  <path d="M54,48 Q52,44 50,48 Q52,50 54,48Z" fill="#81C784"/>
  <path d="M52,46 Q50,42 48,46 Q50,48 52,46Z" fill="#66BB6A"/>
  <path d="M50,44 Q48,40 46,44 Q48,46 50,44Z" fill="#81C784"/>
  <!-- Sparkles -->
  <text x="8" y="12" font-family="Arial" font-size="6" fill="#FFD54F">✦</text>
  <text x="52" y="10" font-family="Arial" font-size="4" fill="#FFD54F">✦</text>
  <text x="4" y="24" font-family="Arial" font-size="4" fill="#FFE082">✦</text>
</svg>
