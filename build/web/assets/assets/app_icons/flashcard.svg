<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Flashcard — Stacked cards with Q&A + lightning bolt -->
  <!-- Card 3 (back, tilted) -->
  <rect x="12" y="8" width="38" height="24" rx="4" fill="#CE93D8" stroke="#7C4DFF" stroke-width="1" transform="rotate(-8 31 20)"/>
  <!-- Card 2 (middle, slightly tilted) -->
  <rect x="10" y="10" width="38" height="24" rx="4" fill="#D1C4E9" stroke="#7C4DFF" stroke-width="1" transform="rotate(-4 29 22)"/>
  <!-- Card 1 (front, straight) — Question side -->
  <rect x="8" y="12" width="38" height="24" rx="4" fill="#EDE7F6" stroke="#7C4DFF" stroke-width="1.5"/>
  <!-- Q badge -->
  <rect x="12" y="15" width="12" height="6" rx="3" fill="#7C4DFF"/>
  <text x="14.5" y="20" font-family="Arial" font-size="5" font-weight="bold" fill="white">Q</text>
  <!-- Question text lines -->
  <line x1="12" y1="25" x2="40" y2="25" stroke="#9575CD" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="29" x2="34" y2="29" stroke="#B39DDB" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12" y1="33" x2="28" y2="33" stroke="#B39DDB" stroke-width="1" stroke-linecap="round"/>
  <!-- Answer card below -->
  <rect x="14" y="40" width="38" height="20" rx="4" fill="#F3E5F5" stroke="#AB47BC" stroke-width="1.2"/>
  <!-- A badge -->
  <rect x="18" y="43" width="12" height="6" rx="3" fill="#AB47BC"/>
  <text x="20.5" y="48" font-family="Arial" font-size="5" font-weight="bold" fill="white">A</text>
  <!-- Answer text lines -->
  <line x1="18" y1="52" x2="46" y2="52" stroke="#CE93D8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="56" x2="40" y2="56" stroke="#E1BEE7" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Lightning bolt (quick recall) -->
  <polygon points="52,6 48,20 52,18 48,32 56,16 52,18 56,6" fill="#FFD54F" stroke="#FF8F00" stroke-width="0.6"/>
  <!-- Flip arrow -->
  <path d="M48,36 Q56,38 48,42" stroke="#7C4DFF" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <polygon points="48,44 50,40 46,41" fill="#7C4DFF"/>
</svg>
